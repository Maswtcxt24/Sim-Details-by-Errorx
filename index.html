<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERRORX - SIM OWNER DETAILS</title>

<style>
body{
background:#000;
font-family:monospace;
color:#fff;
margin:0;
padding:20px;
}

.main-box{
border:2px solid red;
padding:20px;
width:90%;
max-width:400px;
margin:auto;
margin-top:40px;
text-align:center;
box-shadow:0 0 25px red;
}

.title{color:red;font-size:28px;letter-spacing:4px;}
.subtitle{color:#aaa;}
.credit{color:#ff4444;font-size:12px;margin-bottom:10px;}

input{
width:100%;
padding:12px;
background:#111;
border:1px solid red;
color:#fff;
margin-bottom:10px;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
font-weight:bold;
cursor:pointer;
}

.red{background:red;color:#000;}
.green{background:#00c853;color:#000;}

.loader{display:none;margin-top:15px;}

.spinner{
border:3px solid #333;
border-top:3px solid red;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{100%{transform:rotate(360deg);}}

.result{
margin-top:15px;
text-align:left;
max-height:300px;
overflow-y:auto;
}

.item{
border:1px solid red;
padding:10px;
margin-bottom:10px;
}

.label{font-size:12px;color:#aaa;}
.value{font-weight:bold;}

.footer{font-size:11px;color:#888;margin-top:10px;}
</style>
</head>

<body>

<div class="main-box">

<h1 class="title">ERRORX</h1>
<p class="subtitle">SIM OWNER DETAILS</p>
<p class="credit">By ⏤͟͟͞ 𓆩𝐌𝐑 𝐓𝐖𝐈𝐋𝐈𝐆𝐇𝐓</p>

<input type="text" id="input" placeholder="Enter Phone / CNIC">

<button class="btn red" onclick="search()">⚡ EXECUTE SYSTEM</button>
<button class="btn red" onclick="toggleMusic()">🎵 PLAY / PAUSE MUSIC</button>

<a href="https://whatsapp.com/channel/0029Vb5isALI1rcah6CRXm3J" target="_blank">
<button class="btn green">🔥 JOIN ERRORX CHANNEL</button>
</a>

<!-- 🎵 AUDIO TAG -->
<audio id="bgm" loop>
  <source src="suzume.mp3" type="audio/mpeg">
</audio>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Scanning Database...</p>
</div>

<div id="result" class="result"></div>

<p class="footer">© 2026 Made by Abdullah Suleman (𓆩𝐌𝐑 𝐓𝐖𝐈𝐋𝐈𝐆𝐇𝐓) </p>

</div>

<script>

const API="https://famofc.site/api/database.php";

// Search Function
async function search(){
let val=document.getElementById("input").value.trim();

if(!val){
alert("Enter value");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("result").innerHTML="";

try{
let res=await fetch(`${API}?q=${encodeURIComponent(val)}`);
let data=await res.json();

if(!data.success) throw new Error();

let html="";
data.data.records.forEach(r=>{
html+=`
<div class="item">
<div class="label">Name</div>
<div class="value">${r.full_name||"N/A"}</div>

<div class="label">Phone</div>
<div class="value">${r.phone||"N/A"}</div>

<div class="label">CNIC</div>
<div class="value">${r.cnic||"N/A"}</div>

<div class="label">Address</div>
<div class="value">${r.address||"N/A"}</div>
</div>
`;
});

document.getElementById("result").innerHTML=html;

}catch{
document.getElementById("result").innerHTML="❌ No Data Found";
}

document.getElementById("loader").style.display="none";
}

// 🎵 Play / Pause Function
function toggleMusic(){
let audio=document.getElementById("bgm");

if(audio.paused){
audio.play();
}else{
audio.pause();
}
}

</script>

</body>
</html>
