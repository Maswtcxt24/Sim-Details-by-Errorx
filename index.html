<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERRORX - SIM OWNER DETAILS</title>

<style>
body{
background:#000;
font-family:monospace;
color:#fff;
margin:0;
padding:20px;
}

/* Main Box */
.main-box{
border:2px solid red;
padding:20px;
width:90%;
max-width:400px;
margin:auto;
margin-top:40px;
text-align:center;
box-shadow:0 0 25px red;
animation:fade 1s ease;
}

.title{
color:red;
letter-spacing:4px;
font-size:28px;
}

.subtitle{
color:#aaa;
margin-bottom:5px;
}

.credit{
color:#ff4444;
font-size:12px;
margin-bottom:10px;
}

/* Input */
input{
width:100%;
padding:12px;
background:#111;
border:1px solid red;
color:#fff;
margin-bottom:10px;
outline:none;
}

/* Buttons */
.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.btn:active{
transform:scale(0.95);
}

.red{
background:red;
color:#000;
}

.green{
background:#00c853;
color:#000;
}

/* Loader */
.loader{
display:none;
margin-top:15px;
}

.spinner{
border:3px solid #333;
border-top:3px solid red;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* Result scroll fix */
.result{
margin-top:15px;
text-align:left;
max-height:300px;
overflow-y:auto;
padding-right:5px;
}

/* Scrollbar */
.result::-webkit-scrollbar{
width:5px;
}
.result::-webkit-scrollbar-thumb{
background:red;
}

/* Result item */
.item{
border:1px solid red;
padding:10px;
margin-bottom:10px;
animation:fade 0.5s ease;
}

.label{
font-size:12px;
color:#aaa;
}

.value{
font-size:14px;
font-weight:bold;
}

/* Footer */
.footer{
margin-top:10px;
font-size:11px;
color:#888;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* Smooth scroll */
html{
scroll-behavior:smooth;
}
</style>
</head>

<body>

<div class="main-box">

<h1 class="title">ERRORX</h1>
<p class="subtitle">SIM OWNER DETAILS</p>
<p class="credit">By ⏤͟͟͞ 𓆩𝐌𝐑 𝐓𝐖𝐈𝐋𝐈𝐆𝐇𝐓</p>

<input type="text" id="input" placeholder="Enter Phone / CNIC">

<button class="btn red" onclick="search()">⚡ EXECUTE SYSTEM</button>
<button class="btn red" onclick="playMusic()">🎵 PLAY MUSIC</button>

<a href="https://whatsapp.com/channel/0029Vb5isALI1rcah6CRXm3J" target="_blank">
<button class="btn green">🔥 JOIN ERRORX CHANNEL</button>
</a>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Scanning Database...</p>
</div>

<div id="result" class="result"></div>

<p class="footer">© 2026 Abdullah Suleman | ERRORX Project</p>

</div>

<script>

const API="https://famofc.site/api/database.php";

async function search(){
let val=document.getElementById("input").value.trim();

if(!val){
alert("Enter Phone or CNIC");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("result").innerHTML="";

try{
let res=await fetch(`${API}?q=${encodeURIComponent(val)}`);
let data=await res.json();

if(!data.success) throw new Error();

let html="";
data.data.records.forEach(r=>{
html+=`
<div class="item">
<div class="label">Name</div>
<div class="value">${r.full_name||"N/A"}</div>

<div class="label">Phone</div>
<div class="value">${r.phone||"N/A"}</div>

<div class="label">CNIC</div>
<div class="value">${r.cnic||"N/A"}</div>

<div class="label">Address</div>
<div class="value">${r.address||"N/A"}</div>
</div>
`;
});

document.getElementById("result").innerHTML=html;

}catch{
document.getElementById("result").innerHTML="❌ No Data Found";
}

document.getElementById("loader").style.display="none";
}

// Music
function playMusic(){
let audio=new Audio("https://github.com/Maswtcxt24/Sim-Details-by-Errorx/blob/main/suzume.mp3");
audio.play();
}

</script>

</body>
</html>
